# AI 语音控制模块配置
# M2 阶段使用，通过 DeepSeek API 实现自然语言车控

[api]
url = https://api.deepseek.com/v1/chat/completions
# key 已迁移到环境变量 DEEPSEEK_API_KEY,不再硬编码进仓库
key =
model = deepseek-chat
timeout_ms = 3000
max_retries = 1

[safety]
# 行驶中禁止操作列表
speed_threshold_kmh = 5
forbidden_when_moving = door,window

# AI 不可控字段列表
ai_denied = gear

[uds]
socket_path = /tmp/car_core.sock
